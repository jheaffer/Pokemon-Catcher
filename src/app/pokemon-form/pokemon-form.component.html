<div class="pokedex-container">
    <h2>Add a Pokemon</h2>
    <form [formGroup]="pokemonForm" (ngSubmit)="onSubmit()" class="pokemon-form">
        <div class="form-group">
            <label for="name">Name:</label>
            <input id="name" formControlName="name" type="text" required>
        </div>
        <div class="form-group">
            <label for="type">Type:</label>
            <input id="type" formControlName="type" type="text" required>
        </div>
        <div class="form-group">
            <label for="level">Level:</label>
            <input id="level" formControlName="level" type="number" min="1" required>
        </div>
        <div class="form-group">
            <label for="nature">Nature:</label>
            <input id="nature" formControlName="nature" placeholder="Calm">
        </div>
        <div class="form-actions">
            <button type="submit" [disabled]="pokemonForm.invalid">Add Pokemon</button>
        </div>  
    </form>
</div>

<h3>Current Pokedex</h3>
<div class="pokemon-grid">
    @for(p of pokemonService.pokemonList(); track p.id) {
    <div class="pokemon-card">
        <div class="card-info">
            <strong>{{ p.name }}</strong>
            <span>Level: {{ p.level }}</span>
            <p>Type: {{ p.type }} | Nature: {{ p.nature }}</p>
        </div>
    </div>
    }
</div>
